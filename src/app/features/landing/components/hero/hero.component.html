<section id="inicio" class="hero" aria-labelledby="hero-title">
  <div class="container hero-grid">
    <div class="hero-copy">
      <p class="eyebrow">Experiências fotográficas em {{ serviceRegion() }}</p>
      <h1 id="hero-title">Seu evento merece memórias que continuam vivas.</h1>
      <p class="hero-slogan">{{ slogan() }}</p>
      <div class="hero-actions">
        <a class="button" [href]="whatsappUrl()" target="_blank" rel="noopener noreferrer">
          Solicitar orçamento
        </a>
        <a class="text-link" href="#servicos">Conhecer experiências <span aria-hidden="true">↓</span></a>
      </div>
      <p class="hero-note">{{ companyName() }} · Atendimento para eventos sociais e corporativos</p>
    </div>

    <div class="hero-media">
      <picture>
        <source [srcset]="heroImage().webpSrc" type="image/webp" />
        <img
          [src]="heroImage().jpegSrc"
          [alt]="heroImage().alt"
          [width]="heroImage().width"
          [height]="heroImage().height"
          fetchpriority="high"
        />
      </picture>
      <div class="hero-badge" aria-hidden="true">Fotos na hora<br />memórias para sempre</div>
    </div>
  </div>
</section>
