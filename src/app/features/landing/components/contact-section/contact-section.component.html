<section id="contato" class="section contact" aria-labelledby="contact-title">
  <div class="container contact-panel">
    <p class="eyebrow">Vamos planejar?</p>
    <h2 id="contact-title">Conte sobre o seu evento.</h2>
    <p>
      A {{ companyName() }} atende {{ serviceRegion() }} com experiências pensadas para o formato da sua celebração.
    </p>
    <a class="button button--light" [href]="whatsappUrl()" target="_blank" rel="noopener noreferrer">
      Conversar pelo WhatsApp
    </a>
  </div>
</section>
