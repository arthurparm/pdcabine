<section class="social-proof" aria-labelledby="proof-title">
  <div class="container proof-panel">
    <h2 id="proof-title" class="sr-only">Reconhecimento e avaliações da PD Cabine</h2>
    <dl class="metrics">
      @for (metric of metrics(); track metric.label) {
        <div>
          <dd>{{ metric.value }}</dd>
          <dt>{{ metric.label }}</dt>
        </div>
      }
    </dl>
    <p class="verification"><span aria-hidden="true">●</span> Dados públicos verificados em {{ verificationDate() }}.</p>
  </div>
</section>
