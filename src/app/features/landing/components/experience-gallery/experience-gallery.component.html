<section id="galeria" class="section gallery" aria-labelledby="gallery-title">
  <div class="container">
    <div class="section-heading" appReveal="up">
      <p class="eyebrow">Eventos reais</p>
      <h2 id="gallery-title">Momentos que ficam</h2>
      <p>Um pouco das experiências, estruturas e lembranças criadas em eventos reais.</p>
    </div>

    <div class="gallery-grid">
      @for (image of images(); track image.id; let index = $index) {
        <figure
          [class]="'gallery-item gallery-item--' + image.gridSpan"
          appReveal="up"
          [revealDelay]="(index % 4) * 70"
        >
          <button
            #thumbnail
            type="button"
            class="gallery-trigger"
            [attr.aria-label]="'Ampliar: ' + image.alt"
            (click)="openLightbox(index, thumbnail)"
          >
            <picture>
              <source
                [srcset]="image.webpSrcSet"
                sizes="(max-width: 520px) calc(100vw - 2rem), (max-width: 840px) 50vw, 25vw"
                type="image/webp"
              />
              <img
                [src]="image.jpegSrc"
                [alt]="image.alt"
                [width]="image.width"
                [height]="image.height"
                [style.object-position]="image.objectPosition"
                loading="lazy"
                decoding="async"
              />
            </picture>
            <span class="gallery-action" aria-hidden="true">↗</span>
          </button>
          <figcaption class="sr-only">{{ image.caption }}</figcaption>
        </figure>
      }
    </div>
  </div>
</section>

<dialog
  #lightbox
  class="lightbox"
  aria-labelledby="lightbox-caption"
  aria-describedby="lightbox-counter"
  (keydown)="handleKeydown($event)"
  (cancel)="handleCancel($event)"
  (click)="closeFromBackdrop($event)"
>
  @if (activeImage(); as image) {
    <div
      class="lightbox-panel"
      animate.enter="lightbox-panel-enter"
      animate.leave="lightbox-panel-leave"
      (animate.leave)="finishClose($event)"
      (pointerdown)="startTouch($event)"
      (pointerup)="endTouch($event)"
    >
      <button
        #closeButton
        class="lightbox-close"
        type="button"
        aria-label="Fechar galeria ampliada"
        (click)="closeLightbox()"
      >
        <svg
          aria-hidden="true"
          width="20"
          height="20"
          viewBox="0 0 20 20"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
        >
          <path d="M4 4 16 16M16 4 4 16" />
        </svg>
      </button>
      <button
        class="lightbox-nav lightbox-nav--previous"
        type="button"
        aria-label="Imagem anterior"
        (click)="previous()"
      >
        <svg
          aria-hidden="true"
          width="18"
          height="18"
          viewBox="0 0 18 18"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path d="m11 4-5 5 5 5" />
        </svg>
      </button>
      <picture class="lightbox-media">
        <source [srcset]="image.webpSrcSet" sizes="100vw" type="image/webp" />
        <img
          [src]="image.jpegSrc"
          [alt]="image.alt"
          [width]="image.width"
          [height]="image.height"
          decoding="async"
        />
      </picture>
      <button
        class="lightbox-nav lightbox-nav--next"
        type="button"
        aria-label="Próxima imagem"
        (click)="next()"
      >
        <svg
          aria-hidden="true"
          width="18"
          height="18"
          viewBox="0 0 18 18"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path d="m7 4 5 5-5 5" />
        </svg>
      </button>
      <div class="lightbox-meta">
        <p id="lightbox-caption">{{ image.caption }}</p>
        <p id="lightbox-counter" aria-live="polite">
          {{ activeIndex()! + 1 }} de {{ images().length }}
        </p>
      </div>
    </div>
  }
</dialog>
